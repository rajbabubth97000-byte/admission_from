<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>  Raj School Admission Form</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #acb6e5);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .form-container {
      background: rgb(246, 217, 217);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(14, 14, 14, 0.2);
      max-width: 500px;
      width: 100%;
      animation: slideIn 0.6s ease-in-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(30px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      color: #555;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 25px;
      border: none;
      border-radius: 10px;
      background: #476486;
      color: rgb(230, 12, 12);
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #357ABD;
    }

    .error {
      color: rgb(16, 16, 16);
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2> Climax coaching Admission Form</h2>
    <h2>Session 2025-26</h2>
    <form action="save.php" method="POST">
      <label for="name">Students Name *</label>
      <input type="text" id="name" name="name" required />

      <label for="age">Age *</label>
      <input type="number" id="age" name="age" required min="4" max="100" />

      <label for="name">Father Name *</label>
      <input type="text" id="name" name="name" required />

      <label for="name">Mother Name *</label>
      <input type="text" id="name" name="name" required />

      <label for="gender">Gender *</label>
      <select id="gender" name="gender" required>
        <option value="">--Select--</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
      </select>

      <label for="class">Select Class *</label>
      <select id="class" name="class" required>
        <option value="">--Select Class--</option>
        <option>Class option</option>
        <option>Class Nurs</option>
        <option>Class LKG</option>
        <option>Class UKG</option>
        <option>Class 1</option>
        <option>Class 2</option>
        <option>Class 3</option>
        <option>Class 4</option>
        <option>Class 5</option>
        <option>Class 6</option>
        <option>Class 7</option>
        <option>Class 8</option>
        <option>Class 9</option>
        <option>Class 10</option>
        <!-- Add more as needed -->
      </select>

      <label for="email">Parent's Email *</label>
      <input type="email" id="email" name="email" required />

      <label for="phone">Phone Number *</label>
      <input type="tel" id="phone" name="phone" required pattern="[0-9]{10}" placeholder="10-digit number" />

      <label for="address">Address *</label>
      <textarea id="address" name="address" rows="3" required></textarea>

      <button type="submit">Submit Application</button>
    </form>
  </div>

  <script>
    function validateForm() {
      const form = document.getElementById("admissionForm");
      const phone = document.getElementById("phone").value;

      if (!/^\d{10}$/.test(phone)) {
        alert("Please enter a valid 10-digit phone number.");
        return false;
      }

      alert("Form submitted successfully!");
      form.reset(); // optional: clear the form
      return false; // Prevent actual submission for demo
    }
  </script>
</body>
</html>
